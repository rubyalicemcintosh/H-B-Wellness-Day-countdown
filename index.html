<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=300, initial-scale=1.0" />
  <title>H&B Wellness Day Countdown</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 300px;
      height: 300px;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }

    .countdown-widget {
      width: 300px;
      height: 300px;
      background-color: #005335;
      position: relative;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #ffffff;
      font-weight: bold;
      padding: 20px;
    }

    .confetti-container {
      position: absolute;
      inset: 0;
      width: 300px;
      height: 300px;
      overflow: hidden;
      pointer-events: none;
      z-index: 1;
    }

    .confetti {
      position: absolute;
      top: -20px;
      width: 5px;
      height: 10px;
      background: #d4af37;
      opacity: 0.65;
      border-radius: 1px;
      animation: fall linear infinite;
    }

    @keyframes fall {
      0% {
        transform: translateY(-20px) rotate(0deg);
      }

      100% {
        transform: translateY(330px) rotate(360deg);
      }
    }

    .content {
      position: relative;
      z-index: 2;
      width: 100%;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 21px;
      line-height: 1.15;
      color: #ffffff;
      font-weight: bold;
      text-align: center;
    }

    .ampersand {
      color: #93c90f;
    }

    .divider {
      width: 70%;
      height: 2px;
      background: #ffffff;
      margin: 0 auto 16px;
    }

    .timer {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 9px;
      width: 100%;
    }

    .time-box {
      border: 2px solid #ffffff;
      padding: 7px 4px;
      color: #ffffff;
      font-weight: bold;
      text-align: center;
    }

    .number {
      display: block;
      font-size: 24px;
      line-height: 1;
      color: #ffffff;
      font-weight: bold;
    }

    .label {
      display: block;
      margin-top: 4px;
      font-size: 10px;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: #ffffff;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="countdown-widget">
    <div class="confetti-container" id="confettiContainer"></div>

    <div class="content">
      <h1>Get Ready for H<span class="ampersand">&amp;</span>B Wellness Day</h1>

      <div class="divider"></div>

      <div class="timer">
        <div class="time-box">
          <span class="number" id="days">00</span>
          <span class="label">Days</span>
        </div>

        <div class="time-box">
          <span class="number" id="hours">00</span>
          <span class="label">Hours</span>
        </div>

        <div class="time-box">
          <span class="number" id="minutes">00</span>
          <span class="label">Minutes</span>
        </div>

        <div class="time-box">
          <span class="number" id="seconds">00</span>
          <span class="label">Seconds</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const targetDate = new Date(2026, 5, 12, 0, 0, 0).getTime();

    function updateCountdown() {
      const now = new Date().getTime();
      const distance = targetDate - now;

      if (distance <= 0) {
        document.getElementById("days").textContent = "00";
        document.getElementById("hours").textContent = "00";
        document.getElementById("minutes").textContent = "00";
        document.getElementById("seconds").textContent = "00";
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((distance / (1000 * 60)) % 60);
      const seconds = Math.floor((distance / 1000) % 60);

      document.getElementById("days").textContent = String(days).padStart(2, "0");
      document.getElementById("hours").textContent = String(hours).padStart(2, "0");
      document.getElementById("minutes").textContent = String(minutes).padStart(2, "0");
      document.getElementById("seconds").textContent = String(seconds).padStart(2, "0");
    }

    function createFallingConfetti() {
      const container = document.getElementById("confettiContainer");
      const goldColours = ["#d4af37", "#f7d774", "#ffd700", "#c89b3c"];

      for (let i = 0; i < 35; i++) {
        const piece = document.createElement("span");

        piece.className = "confetti";
        piece.style.left = Math.random() * 300 + "px";
        piece.style.backgroundColor = goldColours[Math.floor(Math.random() * goldColours.length)];
        piece.style.animationDuration = 3 + Math.random() * 4 + "s";
        piece.style.animationDelay = Math.random() * -7 + "s";
        piece.style.opacity = 0.35 + Math.random() * 0.35;

        if (Math.random() > 0.5) {
          piece.style.width = "4px";
          piece.style.height = "8px";
        }

        container.appendChild(piece);
      }
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
    createFallingConfetti();
  </script>
</body>
</html>
